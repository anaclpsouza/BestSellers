<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Best Sellers Amazon</title>
    <script src="config.js"></script>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
    <div class="container mt-5">
        <h1>Olá! Veja os top 3 mais vendidos da Amazon!</h1>
        <hr>
        <div id="products-container" class="row">
            <h3>Carregando produtos...</h3>
        </div>
    </div>

    <script>
        const API_URL = window.CONFIG.API_URL;

        async function loadProducts() {
            const container = document.getElementById('products-container');
            
            if (!API_URL) {
                container.innerHTML = "<h3 style='color:red'>Erro: URL da API não definida no config.js</h3>";
                return;
            }

            try {
                const response = await fetch(API_URL);
                const data = await response.json();
                
                container.innerHTML = "";
                const products = data.items || [];

                if (products.length === 0) { 
                    container.innerHTML = "<h3>Nenhum produto encontrado no banco.</h3>";
                    return;
                }

                products.forEach(p => {
                    container.innerHTML += `
                        <div class="col-md-4 mb-4">
                            <div class="card shadow-sm">
                                <img src="${p.image}" class="card-img-top p-3" style="height: 200px; object-fit: contain;">
                                <div class="card-body">
                                    <h5 class="card-title text-truncate">${p.title}</h5>
                                    <p class="card-text text-success fw-bold">${p.price}</p>
                                </div>
                            </div>
                        </div>
                    `;
                });
            } catch (error) {
                console.error("Erro no Fetch:", error);
                container.innerHTML = "<h3>Erro ao conectar com a API da AWS.</h3>";
            }
        }
        loadProducts();
    </script>
</body>
</html>
